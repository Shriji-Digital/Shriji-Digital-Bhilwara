<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shriji Digital - Live Inventory</title>
<style>
  /* --- Modern UI Color Palette & Reset --- */
  :root {
    --primary: #4f46e5;
    --secondary: #818cf8;
    --danger: #ef4444;
    --bg: #f4f7f6;
    --card-bg: #ffffff;
    --text: #1f2937;
    --text-muted: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { background: var(--bg); color: var(--text); padding: 20px; line-height: 1.6; }
  .container { max-width: 1200px; margin: auto; }

  /* --- Header --- */
  .header {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white; padding: 40px 20px; border-radius: 20px; text-align: center;
    box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2); margin-bottom: 30px;
  }
  .header h1 { font-size: 2.5rem; margin-bottom: 8px; letter-spacing: 1px; }
  .header p { font-size: 1.1rem; opacity: 0.9; }

  /* --- Navigation Tabs --- */
  .tabs {
    display: flex; background: var(--card-bg); border-radius: 15px; overflow: hidden;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px;
  }
  .tab-btn {
    flex: 1; padding: 18px; border: none; font-size: 16px; font-weight: 600;
    cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.3s ease;
  }
  .tab-btn:hover { background: #f9fafb; color: var(--primary); }
  .tab-btn.active { background: var(--primary); color: white; }

  /* --- Content Areas --- */
  .tab-content {
    display: none; background: var(--card-bg); padding: 35px; border-radius: 20px;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); animation: fadeIn 0.4s ease-in-out;
  }
  .tab-content.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* --- Grid & Cards --- */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 20px; }
  .card {
    background: var(--card-bg); padding: 25px; border-radius: 16px; text-align: center;
    border: 1px solid #f3f4f6; transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: space-between;
  }
  .card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: var(--secondary); }
  .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }
  .card h3 { font-size: 1.4rem; color: var(--primary); margin-bottom: 10px; }
  .card p { color: var(--text-muted); margin-bottom: 5px; font-size: 1rem; }
  .badge { display: inline-block; background: #e0e7ff; color: var(--primary); padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-top: 10px; margin-bottom: 15px;}

  /* --- Forms, Inputs & Buttons --- */
  h2 { margin-bottom: 15px; color: var(--text); border-bottom: 2px solid var(--bg); padding-bottom: 10px;}
  .search { width: 100%; padding: 15px 20px; border-radius: 12px; border: 2px solid #e5e7eb; font-size: 16px; transition: border 0.3s; margin-bottom: 25px; outline: none; }
  .search:focus { border-color: var(--primary); }
  input, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #d1d5db; margin-bottom: 15px; font-size: 15px; outline: none; transition: 0.3s; background: #f9fafb; }
  input:focus, select:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
  .btn {
    background: var(--primary); color: white; padding: 12px 24px; border: none; border-radius: 25px;
    cursor: pointer; font-weight: bold; font-size: 15px; transition: all 0.3s; display: inline-block; text-decoration: none; width: 100%; margin-top: 10px;
  }
  .btn:hover { background: #4338ca; transform: scale(1.02); box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }
  .btn-danger { background: var(--danger); }
  .btn-danger:hover { background: #dc2626; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }
  .form-container { max-width: 500px; margin: 0 auto; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🛒 Shriji Digital</h1>
    <p>Live Cloud Inventory Management</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="window.switchTab('customer')">🛍️ Customer View</button>
    <button class="tab-btn" onclick="window.openManager()">⚙️ Manager Hub</button>
    <button class="tab-btn" onclick="window.switchTab('settings')">🔒 Settings</button>
  </div>

  <div id="customer" class="tab-content active">
    <h2>🔍 Search Products</h2>
    <input id="searchBar" class="search" placeholder="Type to search for products or categories..." oninput="window.searchProducts()">
    
    <h2 style="margin-top:30px;">📂 Browse by Category</h2>
    <div id="categoryViewGrid" class="grid"></div>
    
    <h2 style="margin-top:40px;">✨ All Products</h2>
    <div id="productsGrid" class="grid"></div>
  </div>

  <div id="manager" class="tab-content">
    <h2>📁 Manage Categories</h2>
    <div style="max-width: 300px; margin-bottom: 20px;">
      <button class="btn" onclick="window.showAddCategory()">+ Add New Category</button>
    </div>
    <div id="categoryForm" class="form-container"></div>
    <div id="categoriesManagerGrid" class="grid"></div>
    
    <h2 style="margin-top:50px;">📦 Manage Products</h2>
    <div style="max-width: 300px; margin-bottom: 20px;">
      <button class="btn" onclick="window.showAddProduct()">+ Add New Product</button>
    </div>
    <div id="productForm" class="form-container"></div>
    <div id="productsManagerGrid" class="grid"></div>
  </div>

  <div id="settings" class="tab-content">
    <div class="form-container" style="text-align: center; padding: 20px;">
      <h2>🔑 Change Manager Password</h2>
      <p style="margin-bottom: 20px; color: var(--text-muted);">Secure your inventory manager dashboard.</p>
      <input id="oldPass" type="password" placeholder="Current Password">
      <input id="newPass" type="password" placeholder="New Password">
      <button class="btn" onclick="window.changePassword()">Update Password</button>
    </div>
  </div>
</div>

<script type="module">
  // 1. Import Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  // 2. Your specific Firebase Config from your screenshots
  const firebaseConfig = {
    apiKey: "AIzaSyArkLSQxbWb1tGDXN_QixQqBth57z7NICs",
    authDomain: "shriji-digital.firebaseapp.com",
    projectId: "shriji-digital",
    storageBucket: "shriji-digital.firebasestorage.app",
    messagingSenderId: "1078180461331",
    appId: "1:1078180461331:web:d11e6d7017c8d837b6f8e6",
    measurementId: "G-QBDMYZ62PZ",
    databaseURL: "https://shriji-digital-default-rtdb.firebaseio.com" 
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Global variables
  window.categories = [];
  window.products = [];
  
  // Try to load password from local storage, default to 1234
  let managerPassword = localStorage.getItem("shrPassCloud") || "1234"; 
  let managerUnlocked = false;

  // 3. Load Data Live from Firebase
  const categoriesRef = ref(db, 'categories');
  onValue(categoriesRef, (snapshot) => {
    window.categories = snapshot.val() || [];
    window.render();
  });

  const productsRef = ref(db, 'products');
  onValue(productsRef, (snapshot) => {
    window.products = snapshot.val() || [];
    window.render();
  });

  // 4. Save Data to Firebase Functions
  window.saveCategories = function() { set(ref(db, 'categories'), window.categories); }
  window.saveProducts = function() { set(ref(db, 'products'), window.products); }

  // --- UI Functions ---
  window.openManager = function() {
    if(!managerUnlocked){
      const p = prompt("Enter Manager Password:");
      if(p !== managerPassword){alert("Incorrect Password!");return;}
      managerUnlocked = true;
    }
    window.switchTab('manager');
  }

  window.changePassword = function(){
    let oldP = document.getElementById("oldPass").value;
    let newP = document.getElementById("newPass").value;
    if(oldP !== managerPassword){alert("Wrong old password");return;}
    if(newP.trim().length < 4){alert("New password must be at least 4 characters");return;}
    managerPassword = newP;
    localStorage.setItem("shrPassCloud", newP);
    document.getElementById("oldPass").value = "";
    document.getElementById("newPass").value = "";
    alert("Password changed successfully!");
  }

  window.showAddCategory = function(){
    document.getElementById("categoryForm").innerHTML = `
      <div class='card' style='margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid var(--primary);'>
        <h3>➕ Add New Category</h3>
        <input id='catName' placeholder='e.g., Laptops, Cables, Services'>
        <button class='btn' onclick='window.addCategory()'>Save to Cloud</button>
        <button class='btn btn-danger' onclick="document.getElementById('categoryForm').innerHTML=''">Cancel</button>
      </div>`;
  }

  window.addCategory = function(){
    let name = document.getElementById("catName").value.trim();
    if(!name){alert("Enter a category name");return;}
    window.categories.push({id: Date.now(), name});
    window.saveCategories(); 
    document.getElementById('categoryForm').innerHTML='';
  }

  window.showAddProduct = function(){
    if(window.categories.length===0){alert("Please add at least one category first!");return;}
    document.getElementById("productForm").innerHTML = `
      <div class='card' style='margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 2px solid var(--primary);'>
        <h3>➕ Add New Product</h3>
        <input id='pname' placeholder='Product Name'>
        <input id='pprice' type='number' placeholder='Price (₹)'>
        <input id='pstock' type='number' placeholder='Available Stock'>
        <select id='pcategory'>
          <option value="" disabled selected>Select a Category...</option>
          ${window.categories.map(c=>`<option value='${c.id}'>${c.name}</option>`).join("")}
        </select>
        <div style="text-align:left; margin-bottom:10px;"><small style="color:var(--text-muted);">Upload Image (Max 1MB)</small></div>
        <input type='file' id='pimg' accept='image/*' style="background:white;">
        <button class='btn' onclick='window.addProduct()'>Save to Cloud</button>
        <button class='btn btn-danger' onclick="document.getElementById('productForm').innerHTML=''">Cancel</button>
      </div>`;
  }

  window.addProduct = function(){
    let name = document.getElementById("pname").value.trim();
    let price = document.getElementById("pprice").value;
    let stock = document.getElementById("pstock").value;
    let catVal = document.getElementById("pcategory").value;
    let file = document.getElementById("pimg").files[0];

    if(!name || !price || !catVal){alert("Please fill out name, price, and category.");return;}
    if(!file||!file.type.startsWith("image/")){alert("Please upload a valid image.");return;}
    if(file.size > 1*1024*1024){alert("Image is too large! Max 1MB allowed to save cloud database space.");return;}
    
    const reader = new FileReader();
    reader.onload = ()=>{
      window.products.push({
        id: Date.now(),
        name: name,
        price: price,
        stock: stock || 0,
        categoryId: parseInt(catVal),
        img: reader.result
      });
      window.saveProducts(); 
      document.getElementById('productForm').innerHTML='';
    };
    reader.readAsDataURL(file);
  }

  window.deleteCategory = function(id){
    if(!confirm("Are you sure? Products in this category will become 'Uncategorized'.")) return;
    window.categories = window.categories.filter(c=>c.id!==id);
    window.saveCategories();
  }

  window.deleteProduct = function(id){
    if(!confirm("Are you sure you want to delete this product?"))return;
    window.products = window.products.filter(p=>p.id!==id);
    window.saveProducts();
  }

  window.switchTab = function(tab){
    document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(t=>t.classList.remove("active"));
    
    document.getElementById(tab).classList.add("active");
    // Find the button that called this and make it active
    event.currentTarget.classList.add("active");
    
    setTimeout(window.render,50);
  }

  window.searchProducts = function(){
    let q = document.getElementById("searchBar").value.toLowerCase();
    let results = window.products.filter(p=>
      p.name.toLowerCase().includes(q) || 
      (window.categories.find(c=>c.id===p.categoryId)?.name.toLowerCase().includes(q))
    );
    displayProducts(results, "productsGrid", false);
  }

  function displayProducts(list, elementId, isManager){
    document.getElementById(elementId).innerHTML = list.map(p=>{
      let catName = window.categories.find(c=>c.id===p.categoryId)?.name || "Uncategorized";
      let buttons = isManager ? `<button class='btn btn-danger' onclick='window.deleteProduct(${p.id})'>🗑️ Delete Product</button>` : `<a download='product.jpg' href='${p.img}' class='btn' style='background: var(--secondary);'>⬇️ Download Image</a>`;
      
      return `
      <div class='card'>
        <div>
          <img src='${p.img}' alt='Product Image'>
          <span class='badge'>${catName}</span>
          <h3>${p.name}</h3>
          <p style="font-size: 1.2rem; color: var(--text); font-weight: bold;">₹${p.price}</p>
          <p>📦 Stock Available: <b>${p.stock}</b></p>
        </div>
        <div style="margin-top: 15px;">
          ${buttons}
        </div>
      </div>`;
    }).join("");
    
    if(list.length === 0) {
       document.getElementById(elementId).innerHTML = "<p style='grid-column: 1/-1; text-align:center; color: var(--text-muted);'>No products found.</p>";
    }
  }

  window.render = function(){
    // Customer Category View
    document.getElementById("categoryViewGrid").innerHTML = window.categories.map(c=>`
      <div class='card' style='justify-content: center; min-height: 120px;'>
        <h3 style='margin:0; font-size:1.6rem;'>${c.name}</h3>
        <p style='margin-top:10px;'>🏷️ ${window.products.filter(p=>p.categoryId===c.id).length} Items</p>
      </div>`).join("");
      
    if(window.categories.length === 0) document.getElementById("categoryViewGrid").innerHTML = "<p style='grid-column: 1/-1;'>No categories available.</p>";

    // Customer Product View
    displayProducts(window.products, "productsGrid", false);

    // Manager Category View
    document.getElementById("categoriesManagerGrid").innerHTML = window.categories.map(c=>`
      <div class='card' style='justify-content: center; min-height: 150px;'>
        <h3 style='margin:0; font-size:1.5rem;'>${c.name}</h3>
        <p style='margin-top:5px; margin-bottom:15px;'>🏷️ ${window.products.filter(p=>p.categoryId===c.id).length} Items</p>
        <button class='btn btn-danger' onclick='window.deleteCategory(${c.id})'>🗑️ Delete</button>
      </div>`).join("");

    // Manager Product View
    displayProducts(window.products, "productsManagerGrid", true);
  }
</script>
</body>
  </html>
